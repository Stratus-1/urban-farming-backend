services:
  api:
    build: .
    env_file: .env
    environment:
      # Inside the compose network the database host is `postgres`, not 127.0.0.1.
      DATABASE_URL: postgresql+asyncpg://urban_farming:local-development-only@postgres:5432/urban_farming
    ports:
      - "8000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: urban_farming
      POSTGRES_USER: urban_farming
      POSTGRES_PASSWORD: local-development-only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urban_farming -d urban_farming"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  postgres_data:

